apiVersion: apps/v1
kind: Deployment
metadata:
  name: tone-coffee

spec:
  replicas: 2

  selector:
    matchLabels:
      app: tone-coffee

  template:
    metadata:
      labels:
        app: tone-coffee

    spec:
      imagePullSecrets:
        - name: ghcr-secret

      containers:
        - name: app

          image: ghcr.io/wanxsky/tone-coffee:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: tone-coffee-config

            - secretRef:
                name: tone-coffee-secret

          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"

          readinessProbe:
            httpGet:
              path: /
              port: 8000

            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 8000

            initialDelaySeconds: 15
            periodSeconds: 20
